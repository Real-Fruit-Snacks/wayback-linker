# GitLab CI: lets this repository be mirrored or self-hosted on GitLab with no
# extra setup. Push to GitLab and the pipeline below runs automatically.

build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - main.js
      - manifest.json
      - styles.css

pages:
  stage: deploy
  image: alpine:latest
  script:
    - cp -r docs public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
